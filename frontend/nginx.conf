server {
    listen 80;
    server_name _;

    # Root directory for Vite production build
    root /usr/share/nginx/html;
    index index.html;

    # ── React client-side routing fallback ──────────────────────────────────
    # All routes not matched by a static file fall back to index.html
    # so react-router-dom can handle them on the client side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API reverse proxy ────────────────────────────────────────────────────
    # Requests to /api/* are forwarded to the FastAPI backend container.
    # The Docker Compose service name "backend" resolves automatically via
    # Docker's internal DNS.
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Support long-running pipeline requests
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── Static asset caching ─────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
