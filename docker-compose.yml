# ─── Veritas Claims Analytics — Docker Compose ───────────────────────────────
# Services:
#   backend   — FastAPI (Python 3.11) on port 8000
#   frontend  — React + Nginx on port 3000 (host) → 80 (container)
#
# Usage:
#   docker compose up --build          # first run (builds both images)
#   docker compose up -d               # detached
#   docker compose logs -f backend     # stream backend logs
#   docker compose down                # stop & remove containers
#   docker compose down -v             # also remove named volumes (wipes DB!)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── FastAPI Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: veritas_backend
    restart: unless-stopped
    environment:
      # Override any of these via a .env file or shell environment
      DATABASE_URL: sqlite:////data/veritas_claims.db
      APP_NAME: Veritas Claims Analytics
      APP_VERSION: "1.0.0"
      DEBUG: "false"
      INGEST_FOLDER: /data/sample-data
      CONFIG_FOLDER: /app/config
    volumes:
      # Persist SQLite database across container restarts
      - db_data:/data
      # Mount sample-data so the pipeline can read uploaded files
      - ./sample-data:/data/sample-data
      # Mount config so clinic YAML files can be updated without rebuilding
      - ./config:/app/config
    ports:
      # Expose directly for API testing / docs (http://localhost:8000/docs)
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── React + Nginx Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: veritas_frontend
    restart: unless-stopped
    ports:
      # Access the dashboard at http://localhost:3000
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

# ─── Named Volumes ───────────────────────────────────────────────────────────
volumes:
  db_data:
    driver: local
